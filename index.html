<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="On the Five">
<meta name="theme-color" content="#0A1628">
<link rel="manifest" href="manifest.json">
<title>I-5 California Corridor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-deep:#0A1628;
  --bg-card:#132040;
  --blue-shield:#1B3D8C;
  --blue-mid:#2D5A9E;
  --blue-light:#93C5FD;
  --blue-muted:#6B90C4;
  --red:#BE1E2D;
  --red-glow:rgba(190,30,45,.5);
  --white:#FFFFFF;
  --gold:#FFD700;
  --gold-bg:#1A1200;
  --gold-border:#5A4200;
  --orange:#F97316;
  --orange-bg:#1A0A00;
  --orange-border:#7C3500;
  --purple:#A855F7;
  --purple-bg:#150A1A;
  --purple-border:#5B2180;
  --green:#22C55E;
  --font:-apple-system,system-ui,'Segoe UI',sans-serif;
  --line-w:5px;
  --card-w:160px;
  --card-gap:20px;

  /* ── TYPE SCALE — minimum 13px ── */
  --t-hero:20px;   /* POI name, top bar name, distance */
  --t-body:15px;   /* tagline, dialog body, note, buttons */
  --t-label:13px;  /* tags, town, region dividers, status bar, GPS, acc badge, terminus, gap labels */
}

html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg-deep);color:var(--white);min-height:100dvh;overflow:hidden}

.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* ── TOP BANNER (merged header + next stop) ── */
.top-bar{background:var(--bg-deep);border-bottom:2px solid var(--blue-shield);flex-shrink:0;display:flex;align-items:stretch;min-height:64px}

/* Shield zone — left tap target, resets view */
.tb-shield{width:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--blue-shield);cursor:pointer;-webkit-tap-highlight-color:transparent;padding:4px 2px}
.tb-shield:active{background:var(--blue-shield)}
.sh{width:50px;height:52px;background:var(--blue-shield);border:2px solid var(--white);border-radius:5px 5px 50% 50%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;flex-shrink:0;transition:transform .1s;overflow:hidden}
.tb-shield:active .sh{transform:scale(.92)}
.sh .s-bar{width:100%;background:var(--red);text-align:center;font-size:6px;font-weight:900;color:var(--white);letter-spacing:.3px;padding:4px 0;line-height:1;flex-shrink:0}
.sh .s-num{font-size:20px;color:var(--white);font-weight:900;line-height:1;flex:1;display:flex;align-items:center;justify-content:center;padding-bottom:2px}

/* Next stop zone — right tap target, opens POI dialog */
.tb-next{flex:1;display:flex;align-items:center;padding:0 12px 0 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;gap:8px;min-width:0}
.tb-next:active{background:rgba(255,255,255,.04)}
.tb-name{flex:1;font-size:var(--t-hero);font-weight:800;color:var(--white);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tb-name.idle{font-size:var(--t-body);color:var(--blue-mid);font-weight:600}
.tb-dir-pill{width:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--blue-shield);cursor:pointer;padding:10px 6px;background:rgba(27,61,140,0.2);-webkit-tap-highlight-color:transparent}
.tb-dir-pill:active{background:var(--blue-shield)}
.pill-inner{display:flex;flex-direction:column;align-items:center;gap:3px;border:1.5px solid var(--blue-shield);border-radius:4px;padding:5px 8px;min-width:38px}
.pill-arrow{font-size:22px;color:var(--white);line-height:1;font-weight:900}
.pill-label{font-size:12px;font-weight:800;letter-spacing:0.5px;color:var(--blue-light)}
.tb-dist{font-size:var(--t-hero);font-weight:800;color:var(--red);line-height:1;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}
.tb-dist.idle{font-size:var(--t-label);color:var(--blue-mid);font-weight:600}

/* ── STATUS BAR ── */
.sbar{height:44px;border-top:2px solid var(--blue-shield);background:#060E1C;display:flex;align-items:center;padding:0 12px;font-size:var(--t-label);color:var(--blue-muted);font-weight:600;flex-shrink:0;gap:8px}
.sbar .spacer{flex:1}
.sbar-county{font-size:var(--t-label);color:var(--white);font-weight:800;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;border-left:3px solid var(--red);padding-left:8px;transition:color .3s}
.sbar-county.entering{color:var(--gold);border-left-color:var(--gold);animation:countyFlash .6s ease-out}
.sbar-county.exiting{color:var(--red);border-left-color:var(--red);animation:countyFlash .6s ease-out}
@keyframes countyFlash{0%{opacity:.3}40%{opacity:1}100%{opacity:1}}

/* GPS button */
.gps-toggle{font-family:var(--font);font-size:var(--t-label);padding:5px 12px;border:1.5px solid var(--blue-shield);border-radius:2px;color:var(--blue-light);background:transparent;cursor:pointer;font-weight:700;-webkit-appearance:none;outline:none;flex-shrink:0;transition:all .15s}
.gps-toggle.on{background:var(--green);color:#000;border-color:var(--green)}
/* Fav filter button */
.fav-filter{font-family:var(--font);font-size:var(--t-label);padding:5px 10px;border:1.5px solid var(--blue-shield);border-radius:2px;color:var(--blue-light);background:transparent;cursor:pointer;font-weight:700;-webkit-appearance:none;outline:none;flex-shrink:0;transition:all .15s}
.fav-filter.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
/* Dimmed card when fav filter active — defined with fadeIn below */
.corridor{flex:1;position:relative;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.corridor-inner{position:relative;width:100%}
.redline{position:absolute;left:50%;top:0;bottom:0;width:var(--line-w);background:var(--red);transform:translateX(-50%);box-shadow:0 0 10px var(--red-glow)}

/* ── POI CARDS ── */
.card{position:absolute;width:var(--card-w);z-index:3;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.card:active{transform:scale(.97)}
.card.L{right:calc(50% + var(--card-gap))}
.card.R{left:calc(50% + var(--card-gap))}
.card .inner{background:var(--bg-card);border:1.5px solid var(--blue-shield);border-radius:4px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(147,197,253,0.06)}

/* EC badge — hidden by default, gold when shown */
.ec{display:none;font-size:var(--t-label);color:var(--gold);font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.ec.show{display:block}
.cn{font-size:var(--t-hero);font-weight:800;color:var(--white);line-height:1.15;margin-bottom:2px}
.town-inline{font-size:var(--t-label);color:var(--red);font-weight:700;margin-bottom:5px;letter-spacing:.2px}
.ct{font-size:var(--t-body);color:var(--blue-light);line-height:1.55}
.tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:var(--t-label);color:var(--red);border:1px solid rgba(190,30,45,0.6);padding:3px 7px;background:var(--bg-deep);border-radius:2px;font-weight:600;opacity:1}
.tag.ic{color:var(--gold);border-color:var(--gold-border);background:var(--gold-bg);opacity:1}
.tag.hg{color:var(--purple);border-color:var(--purple-border);background:var(--purple-bg);opacity:1}


/* Card connector */
.dot{position:absolute;left:50%;width:14px;height:14px;background:var(--red);border:2px solid var(--white);border-radius:50%;transform:translate(-50%,-50%);z-index:4}
.conn{position:absolute;height:2px;background:var(--blue-shield);z-index:2}
.conn.L{right:calc(50% - 5px);width:calc(var(--card-gap) - 2px)}
.conn.R{left:calc(50% - 5px);width:calc(var(--card-gap) - 2px)}
.tail{position:absolute;left:calc(50% - 1px);width:2px;background:var(--blue-shield);z-index:2;opacity:0.6}

/* Terminus — same structure as region dividers, red instead of blue */
.terminus{position:absolute;left:0;right:0;z-index:5;display:flex;align-items:center;pointer-events:none}
.terminus-line{flex:1;height:1px;background:var(--red);opacity:0.6}
.terminus-label{font-size:var(--t-label);color:var(--white);background:var(--red);font-weight:700;letter-spacing:2.5px;padding:4px 14px;border-radius:2px;white-space:nowrap;text-transform:uppercase}

/* Gap labels */
.gap-label{position:absolute;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.gap-line{width:1px;height:8px;background:var(--blue-shield);opacity:.4}
.gap-text{font-size:var(--t-label);color:var(--blue-mid);font-weight:700;white-space:nowrap;background:var(--bg-deep);padding:0 6px;opacity:.7;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}

/* ── CORRIDOR ── */
.scroll-prog{position:fixed;bottom:0;left:0;height:2px;background:var(--red);z-index:100;transition:width .1s}

/* ── GPS MARKER ── */
.gps-marker{position:absolute;left:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none}
.gps-pulse{position:absolute;width:32px;height:32px;border-radius:50%;background:rgba(34,197,94,.25);border:1.5px solid rgba(34,197,94,.5);transform:translate(-50%,-50%);animation:gpsPulse 2s ease-out infinite}
.gps-core{position:absolute;width:16px;height:16px;background:var(--green);border:2px solid var(--white);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(34,197,94,.8)}
.gps-label{position:absolute;left:14px;top:-10px;font-size:var(--t-label);color:var(--green);font-weight:800;white-space:nowrap;background:var(--bg-deep);padding:2px 5px;border:1px solid var(--green);border-radius:2px;opacity:.9}
@keyframes gpsPulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.8}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}

/* Off-I5 variant — muted dot, directional label */
.gps-pulse-off{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);animation:gpsPulse 3s ease-out infinite}
.gps-core-off{background:#0A1628;border-color:var(--green);box-shadow:none}
.gps-off-arrow{position:absolute;top:-10px;font-size:var(--t-label);color:var(--green);font-weight:800;white-space:nowrap;background:var(--bg-deep);padding:2px 6px;border:1px solid var(--green);border-radius:2px;opacity:.9}
.gps-off-west{right:12px;text-align:right}
.gps-off-east{left:12px;text-align:left}

/* ── DIALOG (bottom sheet) ── */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.dialog{width:100%;max-width:480px;background:var(--bg-card);border:2px solid var(--blue-shield);border-radius:10px 10px 0 0;max-height:58dvh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.6);animation:sheetUp .22s ease-out}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dialog-body{padding:16px}
.dialog-body .cn{font-size:var(--t-hero);margin-bottom:2px}
.dialog-body .town-inline{font-size:var(--t-label);color:var(--red);font-weight:700;margin-bottom:8px}
.dialog-body .ct{font-size:var(--t-body);margin-bottom:12px;font-style:italic}
.dialog-body .note{background:var(--bg-deep);border:1px solid var(--blue-shield);border-radius:4px;padding:12px;margin-bottom:14px;font-size:var(--t-body);color:var(--blue-light);line-height:1.55}
.dialog-body .note::before{content:'📝 '}
.dialog-actions{display:flex;gap:8px;padding-bottom:4px}
.btn{font-family:var(--font);font-size:var(--t-body);padding:10px 20px;border:1.5px solid var(--blue-shield);border-radius:4px;background:transparent;color:var(--blue-light);cursor:pointer;font-weight:700;-webkit-appearance:none;outline:none;white-space:nowrap}
.btn:active{opacity:.8}
.btn.primary{background:var(--red);color:var(--white);border-color:var(--red);flex:1}
.btn.fav{min-width:52px;text-align:center;font-size:18px;padding:10px 14px;flex-shrink:0}
.btn.fav.on{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}

/* Settings sheet */
.settings-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center}
.settings-overlay.open{display:flex}
.settings-sheet{width:100%;max-width:480px;background:var(--bg-card);border:2px solid var(--blue-shield);border-radius:10px 10px 0 0;padding:20px 16px 24px;box-shadow:0 -4px 24px rgba(0,0,0,.6);animation:sheetUp .22s ease-out}
.settings-title{font-size:var(--t-body);font-weight:800;color:var(--white);margin-bottom:14px;letter-spacing:.5px}
.settings-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1.5px solid var(--blue-shield);border-radius:4px;margin-bottom:8px;cursor:pointer;font-size:var(--t-body);color:var(--blue-light);font-weight:700;background:transparent;-webkit-tap-highlight-color:transparent;transition:background .15s}
.settings-opt:active{background:var(--blue-shield)}
.settings-opt.selected{border-color:var(--green);color:var(--white);background:rgba(34,197,94,.08)}
.settings-opt .check{color:var(--green);font-size:16px;opacity:0}
.settings-opt.selected .check{opacity:1}
/* Settings button */
.settings-btn{font-family:var(--font);font-size:16px;padding:5px 9px;border:1.5px solid var(--blue-shield);border-radius:2px;color:var(--blue-light);background:transparent;cursor:pointer;-webkit-appearance:none;outline:none;flex-shrink:0;transition:all .15s;line-height:1}
.settings-btn:active{background:var(--blue-shield)}
/* Settings danger zone */
.settings-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.settings-divider span{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--red);white-space:nowrap;opacity:.7}
.settings-divider::before,.settings-divider::after{content:'';flex:1;height:1px;background:var(--red);opacity:.25}
.nav-picker{display:flex;gap:6px;margin-bottom:8px}
.nav-opt{flex:1;padding:10px 4px;border:1.5px solid var(--blue-shield);border-radius:4px;font-family:var(--font);font-size:var(--t-body);color:var(--blue-light);font-weight:700;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;-webkit-appearance:none;outline:none}
.nav-opt:active{background:var(--blue-shield)}
.nav-opt.selected{border-color:var(--green);color:var(--white);background:rgba(34,197,94,.08)}
.settings-sublabel{font-size:11px;font-weight:800;letter-spacing:.8px;color:var(--blue-light);opacity:.6;margin-bottom:6px}
.settings-clear{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1.5px solid rgba(190,30,45,.4);border-radius:4px;cursor:pointer;font-size:var(--t-body);color:var(--red);font-weight:700;background:transparent;font-family:var(--font);-webkit-tap-highlight-color:transparent;transition:all .2s;-webkit-appearance:none;outline:none}
.settings-clear:active{background:rgba(190,30,45,.1)}
.settings-clear.confirm{border-color:var(--red);background:rgba(190,30,45,.15);color:var(--white)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .3s ease-out forwards;transition:opacity .25s ease}
.card.dimmed{opacity:.2 !important;pointer-events:none}
.tb-dist-unit{font-size:11px;font-weight:600;color:var(--blue-muted);margin-left:2px}
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="tb-shield" onclick="resetView()" title="Reset view">
      <div class="sh"><div class="s-bar">INTERSTATE</div><div class="s-num">5</div></div>
    </div>
    <div class="tb-next" id="tbNext" onclick="openNextDialog()">
      <div class="tb-name idle" id="tbName">I-5 California</div>
      <span class="tb-dist idle" id="tbDist"></span>
    </div>
    <div class="tb-dir-pill" onclick="toggleDir()">
      <div class="pill-inner">
        <span class="pill-arrow" id="tbDirArrow">↑</span>
        <span class="pill-label" id="tbDirLabel">NB</span>
      </div>
    </div>
  </div>

  <div class="corridor" id="corridor">
    <div class="corridor-inner" id="corridorInner">
      <div class="redline"></div>
    </div>
  </div>

  <div class="sbar">
    <span class="sbar-county" id="sbarCounty">—</span>
    <button class="gps-toggle" id="gpsBtn" onclick="toggleGPS()">• GPS OFF</button>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()">
  <div class="settings-sheet" onclick="event.stopPropagation()">
    <div class="settings-title">MAP OPTIONS</div>
    <div class="settings-sublabel">NAVIGATION APP</div>
    <div class="nav-picker">
      <button class="nav-opt" id="nav-google" onclick="setNavApp('google')">🗺️ Google</button>
      <button class="nav-opt" id="nav-apple" onclick="setNavApp('apple')">🍎 Apple</button>
      <button class="nav-opt" id="nav-waze" onclick="setNavApp('waze')">🚗 Waze</button>
    </div>
    <div class="settings-opt" id="hideGasOpt" onclick="toggleHideGas()">
      <span>⛽️ Hide Gas Stations</span><span class="check">✓</span>
    </div>
    <div class="settings-opt" id="favFilterOpt" onclick="toggleFavFilter()">
      <span>⭐️ Only Show Saved Stops</span><span class="check">✓</span>
    </div>
    <button class="settings-clear" id="clearSavedBtn" onclick="clearSaved()" style="margin-top:8px">
      <span id="clearSavedLabel">🗑️ Clear All Saved Stops</span><span id="clearSavedHint" style="font-size:11px;opacity:.7"></span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDialog()">
  <div class="dialog" id="dialogSheet" onclick="closeDialog()">
    <div class="dialog-body" id="dBody"></div>
  </div>
</div>

<div class="scroll-prog" id="scrollProg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<script>
// ===== I-5 SPINE (simplified GeoJSON polyline, SD→Oregon, ~every 30mi) =====
// lat/lng waypoints snapped to actual I-5 centerline
const I5_COORDS=[
  [-117.108,32.534],  // San Ysidro / border
  [-117.138,32.715],  // San Diego
  [-117.267,32.880],  // Miramar
  [-117.360,33.068],  // Oceanside
  [-117.440,33.272],  // Aliso Creek rest area (MM 59-60)
  [-117.584,33.420],  // San Clemente
  [-117.831,33.680],  // Irvine
  [-118.011,33.858],  // Santa Ana
  [-118.165,34.022],  // Los Angeles
  [-118.380,34.192],  // Burbank
  [-118.529,34.325],  // San Fernando
  [-118.668,34.500],  // Newhall Pass
  [-118.791,34.635],  // Castaic
  [-118.854,34.700],  // Templin Hwy / start of climb
  [-118.883,34.760],  // Gorman Road area
  [-118.895,34.796],  // Gorman approach
  [-118.910,34.836],  // Tejon Pass summit area
  [-118.900,34.870],  // Fort Tejon State Park exit (Exit 210)
  [-118.920,34.920],  // North descent toward Lebec/Wheeler Ridge
  [-118.940,34.985],  // Outlets at Tejon / Laval Rd (Exit 219A)
  [-118.943,35.010],  // Wheeler Ridge / SR-99 split (Exit 221)
  [-119.072,35.128],  // Buttonwillow area
  [-119.383,35.483],  // Kettleman City area
  [-119.972,35.988],  // Bravo Farms / Kettleman
  [-120.242,36.253],  // Harris Ranch / Coalinga
  [-121.021,37.096],  // Santa Nella / Pea Soup
  [-121.300,37.580],  // Los Banos area
  [-121.415,37.880],  // Tracy
  [-121.290,38.054],  // Stockton
  [-121.420,38.350],  // Sacramento south
  [-121.500,38.578],  // Sacramento
  [-121.598,38.760],  // Sacramento north / Natomas
  [-121.823,39.250],  // Williams
  [-122.030,39.610],  // Corning area
  [-122.197,39.928],  // Olive Pit / Corning
  [-122.250,40.178],  // Red Bluff
  [-122.312,40.420],  // Tehama
  [-122.376,40.589],  // Redding / Sundial Bridge
  [-122.420,40.760],  // Shasta Lake
  [-122.407,41.000],  // Dunsmuir approach
  [-122.272,41.208],  // Yaks on the 5 / Dunsmuir
  [-122.330,41.460],  // Mt Shasta city
  [-122.390,41.660],  // Weed
  [-122.440,41.850],  // Yreka area
  [-122.510,41.960],  // Oregon border / Hornbrook
];

const I5_LINE=turf.lineString(I5_COORDS);
const I5_LINE_LEN=turf.length(I5_LINE,{units:'miles'});

const MILE_MIN=0,MILE_MAX=Math.round(I5_LINE_LEN),PAD=50;

// Compute mile marker directly from Turf — distAlong IS the mile, no scaling needed
POIS.forEach(poi=>{
  const pt=turf.point([poi.lng,poi.lat]);
  const snapped=turf.nearestPointOnLine(I5_LINE,pt,{units:'miles'});
  poi.mile=Math.round(snapped.properties.location);
  poi.mile=Math.max(MILE_MIN,Math.min(MILE_MAX,poi.mile));
});

];

const TRANSITION_MILES=3; // miles from boundary to show entering/exiting

function getCountyFromMile(mile){
  if(mile===null||mile===undefined)return null;
  for(let i=COUNTIES.length-1;i>=0;i--){
    if(mile>=COUNTIES[i].mile)return COUNTIES[i];
  }
  return COUNTIES[0];
}

// Returns {county, state:'normal'|'entering'|'exiting', label}
function getCountyState(mile){
  if(mile===null||mile===undefined)return null;
  const county=getCountyFromMile(mile);
  if(!county)return null;
  const distFromStart=mile-county.mile;
  const distFromEnd=county.endMile-mile;
  if(distFromStart<=TRANSITION_MILES){
    return{county,state:'entering',label:`ENTERING: ${county.name}`};
  }
  if(distFromEnd<=TRANSITION_MILES){
    // Find next county for "exiting into" context
    const nextIdx=COUNTIES.indexOf(county)+1;
    const next=COUNTIES[nextIdx];
    return{county,state:'exiting',label:`EXITING: ${county.name}`};
  }
  return{county,state:'normal',label:county.name};
}

let _lastCountyState=null;

function updateCountyDisplay(){
  const el=document.getElementById('sbarCounty');
  if(!el)return;
  let mile;
  if(!gpsActive||gpsMile===null){
    const corridor=document.getElementById('corridor');
    if(!corridor)return;
    const scrollMid=corridor.scrollTop+corridor.clientHeight*0.5;
    mile=yToMile(scrollMid);
  } else {
    mile=gpsMile;
  }
  const cs=getCountyState(mile);
  if(!cs)return;
  el.textContent=cs.label;
  // Only re-trigger animation when state or county actually changes
  const stateKey=cs.label;
  if(stateKey!==_lastCountyState){
    _lastCountyState=stateKey;
    el.classList.remove('entering','exiting');
    void el.offsetWidth; // force reflow to restart animation
    if(cs.state==='entering')el.classList.add('entering');
    else if(cs.state==='exiting')el.classList.add('exiting');
    else el.classList.remove('entering','exiting');
  }
}

function startGPS(){
  if(!navigator.geolocation){return;}
  gpsWatchId=navigator.geolocation.watchPosition(onGpsSuccess,onGpsError,{
    enableHighAccuracy:true,maximumAge:3000,timeout:10000
  });
  // Screen Wake Lock
  if(navigator.wakeLock){
    navigator.wakeLock.request('screen').catch(()=>{});
  }
}

function stopGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null}
  gpsActive=false;gpsMile=null;gpsLat=null;gpsLng=null;lastGpsHeadings=[];
  removeGpsMarker();
  updateNextPill();
  updateCountyDisplay();
}

function onGpsSuccess(pos){
  const{latitude:lat,longitude:lng,accuracy,heading,speed}=pos.coords;
  gpsLat=lat;gpsLng=lng;

  // Snap to I-5 line using Turf — always, regardless of distance
  const pt=turf.point([lng,lat]);
  const snapped=turf.nearestPointOnLine(I5_LINE,pt,{units:'miles'});
  const distFromLine=snapped.properties.dist; // miles off I-5
  const snappedLng=snapped.geometry.coordinates[0];

  // Derive mile marker directly from Turf distAlong — no scaling needed
  const distAlong=snapped.properties.location;
  gpsMile=Math.round(distAlong);
  gpsMile=Math.max(MILE_MIN,Math.min(MILE_MAX,gpsMile));

  // East/west: compare actual lng to snapped lng
  // I-5 runs north-south; west = more negative lng
  const offSide=lng<snappedLng?'west':'east'; // you are west or east of the line
  const isOffI5=distFromLine>0.1; // more than ~500ft from centerline

  gpsActive=true;

  // Direction detection (only meaningful when close to I-5)
  if(typeof heading==='number'&&heading!==null&&!isNaN(heading)&&speed>1){
    lastGpsHeadings.push(heading);
    if(lastGpsHeadings.length>5)lastGpsHeadings.shift();
    const avgH=lastGpsHeadings.reduce((a,b)=>a+b,0)/lastGpsHeadings.length;
    const detected=avgH<90||avgH>=270?'north':'south';
    if(!autoDir||detected!==dir){
      autoDir=true;
      setDir(detected,false);
    }
  }

  const mi=gpsMile;
  placeGpsMarker(mi,isOffI5?offSide:null,isOffI5?distFromLine:null);
  updateNextPill();
  updateCountyDisplay();
  autoScrollToGps(mi);
}

function onGpsError(err){
  gpsActive=false;gpsMile=null;
  removeGpsMarker();
  updateCountyDisplay();
}

// ===== GPS MARKER ON RED LINE =====
function placeGpsMarker(mile,offSide,offDist){
  const inner=document.getElementById('corridorInner');
  const h=totalH();
  let marker=document.getElementById('gpsMarker');
  if(!marker){
    marker=document.createElement('div');
    marker.id='gpsMarker';
    marker.className='gps-marker';
    inner.appendChild(marker);
  }
  const y=mileToY(mile,h);
  marker.style.top=y+'px';

  if(offSide&&offDist){
    // Off I-5 — show shadow dot on line with directional arrow pointing to actual position
    const arrowDir=offSide==='west'?'←':'→';
    const dist=offDist<0.1?'<0.1':Math.round(offDist*10)/10;
    const labelSide=offSide==='west'?'right':'left'; // label on opposite side so it doesn't overlap line
    marker.innerHTML=`
      <div class="gps-pulse gps-pulse-off"></div>
      <div class="gps-core gps-core-off"></div>
      <div class="gps-off-arrow gps-off-${offSide}">${arrowDir} ${dist}mi</div>`;
  }else{
    // On I-5 — normal marker
    marker.innerHTML=`
      <div class="gps-pulse"></div>
      <div class="gps-core"></div>
      <div class="gps-label">YOU</div>`;
  }
}

function removeGpsMarker(){
  const m=document.getElementById('gpsMarker');
  if(m)m.remove();
}

// Auto-scroll: keep GPS dot in upper third of viewport while driving
let lastAutoScroll=0;
let lastUserInteraction=0;
function autoScrollToGps(mile){
  const now=Date.now();
  if(now-lastUserInteraction<5000)return; // don't interrupt active scrolling
  if(now-lastAutoScroll<4000)return; // throttle: max once per 4s
  const corridor=document.getElementById('corridor');
  const h=totalH();
  const y=mileToY(mile,h);
  const viewH=corridor.clientHeight;
  const targetScroll=y-viewH*0.35; // place dot 35% from top
  const currentScroll=corridor.scrollTop;
  if(Math.abs(currentScroll-targetScroll)>viewH*0.4){
    lastAutoScroll=now;
    corridor.scrollTo({top:Math.max(0,targetScroll),behavior:'smooth'});
  }
}

// ===== CHIP SYSTEM =====
const TAG_EMOJI={scenic:'🖼️','rest-area':'😴',food:'🍽️',shopping:'🛍️',historic:'🏛️',quirky:'🤪',iconic:'⭐','ev-charging':'⚡','hidden-gem':'💎',hotel:'🛏️','clean-restrooms':'🚻',showers:'🚿',fuel:'⛽️'};
const TAG_LABEL={'scenic':'Scenic','rest-area':'Rest Area','food':'Food','shopping':'Shopping','historic':'Historic','quirky':'Quirky','iconic':'Iconic','ev-charging':'EV Charging','hidden-gem':'Hidden Gem','hotel':'Hotel','clean-restrooms':'Clean Restrooms','showers':'Showers','fuel':'Fuel'};
const TAG_PRIORITY=['iconic','hidden-gem','food','scenic','quirky','historic','shopping','rest-area','hotel','ev-charging','clean-restrooms','showers','fuel'];

// Build full chip list for sheet: editorial tags + amenity flags, max 5 total
function buildChips(poi){
  const chips=[];
  // Editorial tags (priority-sorted, skip kids/pet-friendly/detour)
  const sorted=[...poi.tags].filter(t=>t!=='kids'&&t!=='pet-friendly'&&t!=='detour')
    .sort((a,b)=>{ const pa=TAG_PRIORITY.indexOf(a),pb=TAG_PRIORITY.indexOf(b); return (pa<0?99:pa)-(pb<0?99:pb); });
  sorted.forEach(t=>chips.push({emoji:TAG_EMOJI[t]||'',label:TAG_LABEL[t]||t.replace(/-/g,' '),cls:t==='iconic'?'ic':t==='hidden-gem'?'hg':''}));
  // Amenity flags — fill remaining slots up to 5
  const amenities=[];
  if(poi.kid) amenities.push({emoji:'🎈',label:'Kids',cls:''});
  if(poi.pet) amenities.push({emoji:'🐾',label:'Pets',cls:''});
  if(poi.ada) amenities.push({emoji:'♿',label:'ADA',cls:''});
  if(poi.rv)  amenities.push({emoji:'🚛',label:'RV OK',cls:''});
  if(poi.cell==='good')               amenities.push({emoji:'📶',label:'Good Signal',cls:''});
  else if(poi.cell&&poi.cell!=='good') amenities.push({emoji:'📵',label:'Weak Signal',cls:''});
  return chips.concat(amenities).slice(0,5);
}

// Top-3 for map card — priority-sorted editorial tags only, no detour
function cardChips(poi){
  return [...poi.tags].filter(t=>t!=='kids'&&t!=='pet-friendly'&&t!=='detour')
    .sort((a,b)=>{ const pa=TAG_PRIORITY.indexOf(a),pb=TAG_PRIORITY.indexOf(b); return (pa<0?99:pa)-(pb<0?99:pb); })
    .slice(0,3)
    .map(t=>({emoji:TAG_EMOJI[t]||'',label:TAG_LABEL[t]||t.replace(/-/g,' '),cls:t==='iconic'?'ic':t==='hidden-gem'?'hg':''}));
}

function renderChip(c){return `<span class="tag${c.cls?' '+c.cls:''}">${c.emoji} ${c.label}</span>`;}
function renderChipEmoji(c){return `<span class="tag${c.cls?' '+c.cls:''}">${c.emoji}</span>`;}


function toggleGPS(){
  if(gpsActive||gpsWatchId!==null){stopGPS()}
  else{startGPS()}
}


const PX_PER_MILE = 26.81; // 26.81px per mile = ~20,000px total for 800mi corridor
function totalH(){ return PAD * 2 + MILE_MAX * PX_PER_MILE; }

function mileToY(mile,h){
  // Mile 0 (San Diego) at bottom, mile 797 (Oregon) at top.
  return PAD + (MILE_MAX - mile) * PX_PER_MILE;
}

function yToMile(y,h){
  return MILE_MAX - (y - PAD) / PX_PER_MILE;
}

function isFav(id){return favs.includes(id)}
function toggleFav(id){
  if(isFav(id))favs=favs.filter(f=>f!==id);else favs.push(id);
  localStorage.setItem('i5_fav',JSON.stringify(favs));
  const b=document.getElementById('favBtn');
  if(b&&b.dataset.id===id){b.classList.toggle('on',isFav(id));b.textContent=isFav(id)?'★':'☆'}
  applyFavFilter();
}

function toggleFavFilter(){
  favFilter=!favFilter;
  const opt=document.getElementById('favFilterOpt');
  if(opt)opt.classList.toggle('selected',favFilter);
  applyFavFilter();
}

function applyFavFilter(){
  if(!favFilter){
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('dimmed'));
    return;
  }
  document.querySelectorAll('.card').forEach(c=>{
    const id=c.dataset.poiId;
    c.classList.toggle('dimmed',!isFav(id));
  });
}

function isGasStation(id){
  return id&&(id.startsWith('loves-')||id.startsWith('costco-gas-'));
}

function applyGasFilter(){
  document.querySelectorAll('[data-poi-id]').forEach(el=>{
    if(isGasStation(el.dataset.poiId))el.style.display=hideGas?'none':'';
  });
}

function toggleHideGas(){
  hideGas=!hideGas;
  const opt=document.getElementById('hideGasOpt');
  if(opt)opt.classList.toggle('selected',hideGas);
  applyGasFilter();
}

function render(){
  const inner=document.getElementById('corridorInner');
  const h=totalH();
  inner.style.height=h+'px';
  const line=inner.querySelector('.redline');
  inner.innerHTML='';
  inner.appendChild(line);
  // Terminus markers — Oregon always at top, San Diego always at bottom
  addTerminus(inner,PAD-14,'Oregon Border');
  addTerminus(inner,h-PAD+6,'Mexico Border');

  // ===== INLINE GAP LABELS (Approach 3) =====
  const milesAsc=[...POIS].sort((a,b)=>a.mile-b.mile);

  // Gap from border to first POI
  if(milesAsc[0].mile>30){
    addGapLabel(inner,h,0,milesAsc[0].mile);
  }
  // Gaps between consecutive POIs
  for(let i=0;i<milesAsc.length-1;i++){
    const gap=milesAsc[i+1].mile-milesAsc[i].mile;
    if(gap>=16) addGapLabel(inner,h,milesAsc[i].mile,milesAsc[i+1].mile);
  }
  // Gap from last POI to border
  if((MILE_MAX-milesAsc[milesAsc.length-1].mile)>30){
    addGapLabel(inner,h,milesAsc[milesAsc.length-1].mile,MILE_MAX);
  }

  // ===== POI CARDS =====
  const sorted=[...POIS].sort((a,b)=>dir==='north'?a.mile-b.mile:b.mile-a.mile);
  cardPositions=[];

  // PASS 1 — create cards and measure heights
  const cardData=[];
  sorted.forEach((poi,i)=>{
    const y=mileToY(poi.mile,h);
    const side=poi.side==='west'?'L':'R';
    const card=document.createElement('div');
    card.className=`card ${side}`;
    card.style.top='0px';
    card.style.animationDelay=(i*.05)+'s';
    card.onclick=()=>openDialog(poi);
    card.dataset.poiId=poi.id;
    card.innerHTML=`<div class="inner">
      ${poi.ec?'<div class="ec show">★ EDITOR\'S CHOICE</div>':''}
      <div class="cn">${poi.name}</div>
      ${poi.town?`<div class="town-inline">${poi.town}</div>`:''}
      <div class="ct">${poi.tagline}</div>
      <div class="tags">${cardChips(poi).map(renderChipEmoji).join('')}</div>
    </div>`;
    inner.appendChild(card);
    const cardH=card.offsetHeight||90;
    cardData.push({poi,y,side,cardEl:card,cardH});
  });

  // PASS 2 — spread cards per side so they don't overlap; dots stay at geographic y
  ['L','R'].forEach(side=>{
    const sc=cardData.filter(c=>c.side===side).sort((a,b)=>a.y-b.y);
    const MIN_GAP=8;
    sc.forEach(c=>{c.top=c.y-c.cardH/2;c.bot=c.y+c.cardH/2;});
    for(let iter=0;iter<300;iter++){
      let moved=false;
      for(let i=0;i<sc.length-1;i++){
        const a=sc[i],b=sc[i+1];
        const overlap=a.bot+MIN_GAP-b.top;
        if(overlap>0.1){
          a.top-=overlap/2;a.bot-=overlap/2;
          b.top+=overlap/2;b.bot+=overlap/2;
          moved=true;
        }
      }
      if(!moved)break;
    }
    sc.forEach(c=>{
      c.cardEl.style.top=c.top+'px';
      const cardMidY=c.top+c.cardH/2;
      // Dot at exact geographic mile position
      const dot=document.createElement('div');
      dot.className='dot';dot.style.top=c.y+'px';
      dot.dataset.poiId=c.poi.id;
      inner.appendChild(dot);
      // Horizontal connector at card vertical midpoint
      const conn=document.createElement('div');
      conn.className=`conn ${side}`;conn.style.top=(cardMidY-1)+'px';
      conn.dataset.poiId=c.poi.id;
      inner.appendChild(conn);
      // Vertical tail bridging dot to connector when card has floated
      const tailH=Math.abs(c.y-cardMidY);
      if(tailH>4){
        const tail=document.createElement('div');
        tail.className='tail';
        tail.style.top=Math.min(c.y,cardMidY)+'px';
        tail.style.height=tailH+'px';
        tail.dataset.poiId=c.poi.id;
        inner.appendChild(tail);
      }
      cardPositions.push({poi:c.poi,yTop:c.top,yBot:c.bot,cardEl:c.cardEl});
    });
  });

  // Scroll to journey origin:
  // NB → start at San Diego (bottom of corridor)
  // SB → start at Oregon (top of corridor)
  const corridor=document.getElementById('corridor');
  setTimeout(()=>{corridor.scrollTop=dir==='north'?corridor.scrollHeight:0},50);
  // Re-place GPS marker if active
  if(gpsActive&&gpsMile!==null)setTimeout(()=>placeGpsMarker(gpsMile),60);
  // Re-apply fav filter and gas filter if active
  setTimeout(()=>{applyFavFilter();applyGasFilter();},70);
}

function addGapLabel(parent,h,mileA,mileB){
  const gap=Math.round(mileB-mileA);
  const midMile=(mileA+mileB)/2;
  const el=document.createElement('div');
  el.className='gap-label';
  el.style.top=mileToY(midMile,h)+'px';
  el.innerHTML=`<div class="gap-line"></div><div class="gap-text">${gap} mi</div><div class="gap-line"></div>`;
  parent.appendChild(el);
}

function addTerminus(parent,top,label){
  const el=document.createElement('div');
  el.className='terminus';el.style.top=top+'px';
  el.innerHTML=`<div class="terminus-line"></div><div class="terminus-label">${label}</div><div class="terminus-line"></div>`;
  parent.appendChild(el);
}

// ===== TOP BANNER =====
function updateNextPill(){
  const corridor=document.getElementById('corridor');
  const scrollTop=corridor.scrollTop;
  const viewH=corridor.clientHeight;
  const h=totalH();

  let currentMile;
  if(gpsActive&&gpsMile!==null){
    currentMile=gpsMile;
  }else{
    currentMile=yToMile(scrollTop+viewH/2,h);
    currentMile=Math.max(MILE_MIN,Math.min(MILE_MAX,currentMile));
  }

  const ahead=POIS.filter(p=>dir==='north'?p.mile>currentMile:p.mile<currentMile)
    .sort((a,b)=>dir==='north'?(a.mile-b.mile):(b.mile-a.mile));

  const nameEl=document.getElementById('tbName');
  const distEl=document.getElementById('tbDist');
  const dirArrowEl=document.getElementById('tbDirArrow');
  const dirLabelEl=document.getElementById('tbDirLabel');
  const nextEl=document.getElementById('tbNext');

  

  if(!ahead.length){
    nextTarget=null;
    nameEl.textContent='I-5 California';
    nameEl.className='tb-name idle';
    dirArrowEl.textContent=dir==='north'?'↑':'↓';
    dirLabelEl.textContent=dir==='north'?'NB':'SB';
    distEl.textContent='';
    distEl.className='tb-dist idle';
    nextEl.style.cursor='default';
    return;
  }

  const next=ahead[0];
  const dist=Math.round(Math.abs(next.mile-currentMile));
  nextTarget=next;

  nameEl.textContent=next.name;
  nameEl.className='tb-name';
  dirArrowEl.textContent=dir==='north'?'↑':'↓';
    dirLabelEl.textContent=dir==='north'?'NB':'SB';
  distEl.textContent=dist+' mi';
  distEl.className='tb-dist';
  nextEl.style.cursor='pointer';
}

function openNextDialog(){
  if(nextTarget) openDialog(nextTarget);
  else toggleDir();
}

function resetView(){
  const corridor=document.getElementById('corridor');
  if(gpsActive&&gpsMile!==null){
    // Scroll to GPS position
    autoScrollToGps(gpsMile);
  }else{
    // Scroll to journey start
    corridor.scrollTo({top:dir==='north'?corridor.scrollHeight:0,behavior:'smooth'});
  }
}

function setDir(d,resetAutoDir=true){
  dir=d;
  if(resetAutoDir)autoDir=false;
  render();
  if(gpsActive&&gpsMile!==null)placeGpsMarker(gpsMile);
  setTimeout(updateNextPill,100);
}

function openDialog(poi){
  const body=document.getElementById('dBody');
  const chips=buildChips(poi);
  body.innerHTML=`
    ${poi.ec?'<div class="ec show" style="margin-bottom:6px">★ EDITOR\'S CHOICE</div>':''}
    <div class="cn">${poi.name}</div>
    ${poi.town?`<div class="town-inline">${poi.town}</div>`:''}
    <div class="ct">"${poi.tagline}"</div>
    <div class="note">${poi.note}</div>
    ${chips.length?`<div class="tags" style="margin-bottom:14px">${chips.map(renderChip).join('')}</div>`:''}
    <div class="dialog-actions">
      <button class="btn primary" onclick="event.stopPropagation();openNav(${poi.lat},${poi.lng})">Navigate ➜</button>
      <button class="btn fav ${isFav(poi.id)?'on':''}" id="favBtn" data-id="${poi.id}" onclick="event.stopPropagation();toggleFav('${poi.id}')">${isFav(poi.id)?'★':'☆'}</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function closeDialog(){
  document.getElementById('overlay').classList.remove('open');
}

function openNav(lat,lng){
  const urls={
    google:`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`,
    apple:`maps://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`,
    waze:`https://waze.com/ul?ll=${lat}%2C${lng}&navigate=yes&zoom=17`
  };
  window.open(urls[navApp]||urls.google,'_blank');
}

function openSettings(){
  updateSettingsUI();
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings(){
  document.getElementById('settingsOverlay').classList.remove('open');
  // Reset clear button if armed
  const btn=document.getElementById('clearSavedBtn');
  const label=document.getElementById('clearSavedLabel');
  const hint=document.getElementById('clearSavedHint');
  if(btn){btn.classList.remove('confirm');label.textContent='🗑️ Clear All Saved Stops';hint.textContent='';}
  clearTimeout(_clearConfirmTimer);
}

function setNavApp(app){
  navApp=app;
  localStorage.setItem('i5_nav',app);
  updateSettingsUI();
}

function updateSettingsUI(){
  ['google','apple','waze'].forEach(a=>{
    const el=document.getElementById(`nav-${a}`);
    if(el)el.classList.toggle('selected',navApp===a);
  });
}

let _clearConfirmTimer=null;
function clearSaved(){
  const btn=document.getElementById('clearSavedBtn');
  const label=document.getElementById('clearSavedLabel');
  const hint=document.getElementById('clearSavedHint');
  if(!btn)return;
  if(btn.classList.contains('confirm')){
    // Second tap — execute
    favs=[];
    localStorage.removeItem('i5_fav');
    applyFavFilter();
    // If filter was on, turn it off since nothing is saved
    if(favFilter){favFilter=false;const fo=document.getElementById('favFilterOpt');if(fo)fo.classList.remove('selected');applyFavFilter();}
    btn.classList.remove('confirm');
    label.textContent='✓ Cleared';
    hint.textContent='';
    clearTimeout(_clearConfirmTimer);
    _clearConfirmTimer=setTimeout(()=>{label.textContent='🗑️ Clear All Saved Stops';},2000);
  } else {
    // First tap — arm confirm state
    btn.classList.add('confirm');
    label.textContent='⚠️ Tap again to confirm';
    hint.textContent='this cannot be undone';
    clearTimeout(_clearConfirmTimer);
    _clearConfirmTimer=setTimeout(()=>{
      btn.classList.remove('confirm');
      label.textContent='🗑️ Clear All Saved Stops';
      hint.textContent='';
    },3000);
  }
}

// Track user touch to suppress auto-scroll while actively scrolling
document.getElementById('corridor').addEventListener('touchstart',()=>{lastUserInteraction=Date.now();},{passive:true});

// Scroll handler — progress bar + pill update
let scrollTick=false;
document.getElementById('corridor').addEventListener('scroll',function(){
  const s=this.scrollTop,h=this.scrollHeight-this.clientHeight;
  document.getElementById('scrollProg').style.width=(h>0?(s/h)*100:0)+'%';
  if(!scrollTick){scrollTick=true;requestAnimationFrame(()=>{updateNextPill();updateCountyDisplay();scrollTick=false})}
},{passive:true});

function toggleDir(){
  setDir(dir==='north'?'south':'north');
}

render();
setTimeout(()=>{updateNextPill();updateCountyDisplay();},200);

setInterval(()=>{
  const btn=document.getElementById('gpsBtn');
  if(btn){
    const active=gpsActive||gpsWatchId!==null;
    btn.classList.toggle('on',active);
    btn.textContent=gpsWatchId!==null&&!gpsActive?'… GPS':gpsActive?'✓ GPS ON':'• GPS OFF';
  }
},500);
// ===== APPLE TOUCH ICON (iOS home screen) =====
// iOS ignores SVG manifest icons — generate shield PNG via canvas at runtime
(function(){
  try{
    const cv=document.createElement('canvas');
    cv.width=180;cv.height=180;
    const ctx=cv.getContext('2d');
    // Background
    ctx.fillStyle='#0A1628';ctx.fillRect(0,0,180,180);
    // Shield rounded rect (arcTo for broad compatibility)
    const x=16,y=16,w=148,h=148,r=16;
    function rrect(){
      ctx.beginPath();
      ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
      ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
      ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
      ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
      ctx.closePath();
    }
    rrect();ctx.fillStyle='#1B3D8C';ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=5;ctx.stroke();
    // Red top bar (clipped to shield)
    ctx.save();rrect();ctx.clip();
    ctx.fillStyle='#BE1E2D';ctx.fillRect(x,y,w,44);
    ctx.restore();
    // Text
    ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.font='900 15px "Arial Black",Arial,sans-serif';
    ctx.fillText('INTERSTATE',90,52);
    ctx.font='900 84px "Arial Black",Arial,sans-serif';
    ctx.fillText('5',90,148);
    // Inject as apple-touch-icon
    const lnk=document.createElement('link');
    lnk.rel='apple-touch-icon';lnk.href=cv.toDataURL('image/png');
    document.head.appendChild(lnk);
  }catch(e){}
})();

    navigator.serviceWorker.register('./sw.js')
